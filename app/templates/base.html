<!DOCTYPE html>
<html lang="ru" class="h-full">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f172a" />
    <title>{% block title %}Messenger{% endblock %}</title>

    <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}" />
    <link rel="icon" href="{{ url_for('static', filename='icons/icon-192.svg') }}" sizes="192x192" />
    <link rel="apple-touch-icon" href="{{ url_for('static', filename='icons/icon-192.svg') }}" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style type="text/tailwindcss">
        @theme {
            --font-sans: "Plus Jakarta Sans", "Segoe UI", sans-serif;
            --font-mono: "JetBrains Mono", monospace;
        }
    </style>

    <link rel="stylesheet" href="{{ asset_url('css/variables.css') }}" />
    <link rel="stylesheet" href="{{ asset_url('css/components.css') }}" />
    <link rel="stylesheet" href="{{ asset_url('css/layout.css') }}" />
    <link rel="stylesheet" href="{{ asset_url('css/sidebar.css') }}" />
    <link rel="stylesheet" href="{{ asset_url('css/chat.css') }}" />
    <link rel="stylesheet" href="{{ asset_url('css/responsive.css') }}" />

    <script>
        (function () {
            const saved = localStorage.getItem("theme");
            const theme = saved || "dark";
            document.documentElement.setAttribute("data-theme", theme);
        })();
    </script>
</head>
<body class="h-full antialiased selection:bg-cyan-500/35 selection:text-white">
    {% block content %}{% endblock %}

    <script src="{{ asset_url('js/socket.io.min.js') }}"></script>
    <script>
        window.APP_RUNTIME = {{ runtime_config | tojson }};
    </script>
    <script src="{{ asset_url('js/config.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
